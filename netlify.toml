[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# El Buscador de Semillas corre por horario, no por webhook.
# Netlify lee el cron directamente del "exports.config.schedule" dentro
# de buscador-semillas.js, pero también puede declararse aquí si prefieres
# centralizarlo:
#
# [[scheduled.buscador-semillas]]
#   schedule = "@weekly"
