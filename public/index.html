<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel — Pipeline de Historias VidiGozTV</title>
  <style>
    :root {
      --bg: #14161a;
      --card: #1e2127;
      --card-2: #262a32;
      --border: #333842;
      --text: #e7e9ec;
      --muted: #9aa1ab;
      --accent: #4f8cff;
      --accent-strong: #2f6fe0;
      --ok: #3fb96b;
      --warn: #d9a33a;
      --err: #e15b5b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      -webkit-text-size-adjust: 100%;
    }
    header {
      padding: 18px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
    .version { font-size: 0.72rem; font-weight: 400; color: var(--muted); margin-left: 6px; vertical-align: middle; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 16px; }
    section { margin-bottom: 26px; }
    section > h2 {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin: 0 0 12px;
    }
    button {
      font: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card-2);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 14px;
      transition: background 0.12s, opacity 0.12s;
    }
    button:hover { background: #2f3540; }
    button:disabled { opacity: 0.5; cursor: default; }
    button.primary {
      background: var(--accent);
      border-color: var(--accent-strong);
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover { background: var(--accent-strong); }
    .big {
      width: 100%;
      font-size: 1.05rem;
      padding: 16px;
      border-radius: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    /* Tabla de historias -> se colapsa en tarjetas en móvil */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .estado {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      background: var(--card-2);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .fecha { color: var(--muted); font-size: 0.82rem; white-space: nowrap; }
    .msg { font-size: 0.85rem; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
    .msg.warn { color: var(--warn); }
    /* Overlay de login */
    #login {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }
    #login .box { width: 100%; max-width: 340px; text-align: center; }
    #login h1 { font-size: 1.1rem; margin-bottom: 4px; }
    #login p { color: var(--muted); font-size: 0.85rem; margin-top: 0; }
    #login input {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      margin: 12px 0;
    }
    .banner {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 0.9rem;
      display: none;
    }
    .banner.ok { background: rgba(63,185,107,0.15); color: var(--ok); display: block; }
    .banner.err { background: rgba(225,91,91,0.15); color: var(--err); display: block; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .hint { color: var(--muted); font-size: 0.8rem; margin: 4px 0 0; }
    @media (max-width: 620px) {
      thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; }
      tr { border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 10px; }
      td { border: none; padding: 4px 0; }
      td::before { content: attr(data-label); color: var(--muted); font-size: 0.72rem; text-transform: uppercase; display: block; }
    }
  </style>
</head>
<body>
  <!-- Login: pide contraseña una vez, la guarda solo en memoria de sesión -->
  <div id="login">
    <div class="box">
      <h1>Panel del Pipeline</h1>
      <p>Historias medievales · VidiGozTV</p>
      <input id="pw" type="password" placeholder="Contraseña" autocomplete="current-password" />
      <button class="primary big" id="login-btn">Entrar</button>
      <p class="msg err" id="login-err"></p>
    </div>
  </div>

  <div id="app" hidden>
    <header>
      <h1>Panel del Pipeline <span class="version">v1.0.3</span></h1>
      <button id="logout">Salir</button>
    </header>

    <div class="wrap">
      <div class="banner" id="banner"></div>

      <!-- 1. Generar historias -->
      <section>
        <div class="row-actions">
          <button class="primary big" id="gen-tragedias-btn">⚔️ Generar Tragedia</button>
          <button class="primary big" id="gen-comedias-btn">🍺 Generar Comedia</button>
        </div>
        <p class="hint">Genera 1 historia completa (texto, prompt de imagen, oficio, año, lugar, sopa) y la publica en Notion con Estado "Revision". Dale click varias veces para generar más de una.</p>
      </section>

      <!-- 2. Panel de historias -->
      <section>
        <h2>Historias <button id="refresh" style="font-size:0.78rem;padding:4px 10px;">↻ Actualizar</button></h2>
        <div class="card" id="historias-card">
          <p class="muted" id="historias-loading">Cargando…</p>
          <table id="historias-tabla" hidden>
            <thead>
              <tr><th>Título</th><th>Estado</th><th>Creada</th></tr>
            </thead>
            <tbody id="historias-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ---- Estado y auth ----
    // La contraseña vive solo en memoria de la sesión del navegador (sessionStorage),
    // nunca en localStorage. Se pierde al cerrar la pestaña.
    const KEY = 'vidigoz_dash_pw';
    let PW = sessionStorage.getItem(KEY) || '';

    // Único estado que se muestra: historias generadas, esperando revisión
    // manual (subir imagen y pasar a "Listo" a mano).
    const ESTADOS_VISIBLES = ['Revision'];

    // ---- Helper de fetch autenticado ----
    async function api(path, body) {
      const res = await fetch('/.netlify/functions/' + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-dashboard-password': PW },
        body: JSON.stringify(body || {}),
      });
      let data = null;
      try { data = await res.json(); } catch (_) {}
      if (res.status === 401) { logout(); throw new Error('Contraseña incorrecta.'); }
      if (!res.ok || (data && data.ok === false)) {
        throw Object.assign(new Error((data && data.error) || ('Error ' + res.status)), { status: res.status, data });
      }
      return data;
    }

    function banner(msg, tipo) {
      const b = document.getElementById('banner');
      b.textContent = msg;
      b.className = 'banner ' + tipo;
      if (tipo === 'ok') setTimeout(() => { b.className = 'banner'; }, 5000);
    }

    function fmtFecha(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
      } catch (_) { return iso; }
    }

    // ---- Login ----
    async function intentarLogin(pw) {
      PW = pw;
      // Validamos contra un endpoint real (listar-historias) para confirmar la contraseña.
      await api('listar-historias');
      sessionStorage.setItem(KEY, pw);
    }

    function mostrarApp() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').hidden = false;
      cargarHistorias();
    }

    function logout() {
      sessionStorage.removeItem(KEY);
      PW = '';
      document.getElementById('app').hidden = true;
      document.getElementById('login').style.display = 'flex';
      document.getElementById('pw').value = '';
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('logout').addEventListener('click', logout);

    async function doLogin() {
      const pw = document.getElementById('pw').value;
      const err = document.getElementById('login-err');
      const btn = document.getElementById('login-btn');
      err.textContent = '';
      if (!pw) { err.textContent = 'Escribe la contraseña.'; return; }
      btn.disabled = true; btn.textContent = 'Entrando…';
      try {
        await intentarLogin(pw);
        mostrarApp();
      } catch (e) {
        err.textContent = e.message || 'No se pudo entrar.';
      } finally {
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }

    // ---- 1. Generar historias ----
    async function generar(endpoint, btn, etiqueta) {
      btn.disabled = true;
      const orig = btn.textContent;
      btn.textContent = 'Generando… (puede tardar ~1-2 min)';
      try {
        const r = await api(endpoint);
        let msg = `Se crearon ${r.creadas.length} historia(s) de ${etiqueta}.`;
        if (r.errores && r.errores.length) {
          msg += ` Fallaron ${r.errores.length}: ${r.errores.map(e => e.titulo).join(', ')}`;
        }
        banner(msg, (r.errores && r.errores.length) ? 'err' : 'ok');
        cargarHistorias();
      } catch (e) {
        banner('Error al generar: ' + e.message, 'err');
      } finally {
        btn.disabled = false; btn.textContent = orig;
      }
    }
    document.getElementById('gen-tragedias-btn').addEventListener('click', (e) => generar('generar-tragedias', e.currentTarget, 'tragedia'));
    document.getElementById('gen-comedias-btn').addEventListener('click', (e) => generar('generar-comedias', e.currentTarget, 'comedia'));

    // ---- 2. Historias ----
    document.getElementById('refresh').addEventListener('click', cargarHistorias);

    async function cargarHistorias() {
      const loading = document.getElementById('historias-loading');
      const tabla = document.getElementById('historias-tabla');
      const body = document.getElementById('historias-body');
      loading.hidden = false; loading.textContent = 'Cargando…';
      tabla.hidden = true;
      try {
        const r = await api('listar-historias');
        body.innerHTML = '';
        const historias = r.historias.filter(h => ESTADOS_VISIBLES.includes(h.estado));
        if (!historias.length) {
          loading.textContent = 'No hay historias esperando tu revisión.';
          return;
        }
        for (const h of historias) {
          body.appendChild(filaHistoria(h));
        }
        loading.hidden = true;
        tabla.hidden = false;
      } catch (e) {
        loading.textContent = 'Error: ' + e.message;
      }
    }

    function filaHistoria(h) {
      const tr = document.createElement('tr');

      const tdT = document.createElement('td');
      tdT.setAttribute('data-label', 'Título');
      if (h.url) {
        const a = document.createElement('a');
        a.href = h.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = h.titulo;
        tdT.appendChild(a);
      } else {
        tdT.textContent = h.titulo;
      }

      const tdE = document.createElement('td');
      tdE.setAttribute('data-label', 'Estado');
      tdE.innerHTML = `<span class="estado">${escapeHtml(h.estado)}</span>`;

      const tdF = document.createElement('td');
      tdF.setAttribute('data-label', 'Creada');
      tdF.innerHTML = `<span class="fecha">${fmtFecha(h.creado)}</span>`;

      tr.append(tdT, tdE, tdF);
      return tr;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ---- Arranque ----
    // Si ya hay contraseña en memoria de sesión, intentamos entrar directo.
    (async () => {
      if (PW) {
        try { await api('listar-historias'); mostrarApp(); return; } catch (_) { logout(); }
      }
      document.getElementById('pw').focus();
    })();
  </script>
</body>
</html>
